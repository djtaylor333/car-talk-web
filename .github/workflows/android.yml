name: Android CI — Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK / AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write google-services.json
        working-directory: android-app/app
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Write keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android-app/app/cartalk-release.jks
          cat > android-app/keystore.properties <<EOF
          storeFile=cartalk-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: android-app
        run: ./gradlew test

      - name: Build Release APK
        working-directory: android-app
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        working-directory: android-app
        run: ./gradlew bundleRelease

      - name: Extract version
        id: version
        run: echo "version=$(jq -r .version version.json)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Car Talk ${{ steps.version.outputs.version }}"
          body_path: RELEASE_NOTES.md
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
