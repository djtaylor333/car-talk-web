<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CarTalk</title>
    <!--
      Single Page App GitHub Pages 404 redirect.
      When GitHub Pages can't find a file, it serves this page.
      This script encodes the current URL path/query/hash into a redirect
      back to index.html so that React Router can handle it.
      Technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      // Number of path segments to keep — 1 for /car-talk-web/
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
